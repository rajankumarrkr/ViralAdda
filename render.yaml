services:
  - type: web
    name: viraladda-server
    runtime: node
    # Root Directory in Render dashboard must be set to: server
    # Build from server dir, navigate up to repo root for full workspace install
    buildCommand: cd .. && npm install && cd server && npm run build:server && test -f dist/server.js && echo "BUILD VERIFIED: dist/server.js exists" || (echo "BUILD FAILED: dist/server.js not found" && exit 1)
    startCommand: node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Add in Render dashboard Environment tab:
      # MONGO_URI, JWT_SECRET, JWT_REFRESH_SECRET
      # TELEGRAM_BOT_TOKEN, TELEGRAM_CHANNEL_ID
